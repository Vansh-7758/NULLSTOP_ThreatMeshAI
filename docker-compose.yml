# docker-compose.yml
version: '3.8'

services:
  neo4j:
    image: neo4j:5-community
    container_name: threatmesh-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/threatmesh123
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - threatmesh

  postgres:
    image: postgres:15-alpine
    container_name: threatmesh-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=threatmesh
      - POSTGRES_PASSWORD=threatmesh
      - POSTGRES_DB=threatmesh
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U threatmesh"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - threatmesh

  redis:
    image: redis:7-alpine
    container_name: threatmesh-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - threatmesh

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: threatmesh-backend
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=threatmesh123
      - POSTGRES_URL=postgresql+asyncpg://threatmesh:threatmesh@postgres:5432/threatmesh
      - REDIS_URL=redis://redis:6379
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_REPO_OWNER=${GITHUB_REPO_OWNER:-}
      - GITHUB_REPO_NAME=${GITHUB_REPO_NAME:-}
      - NVD_API_KEY=${NVD_API_KEY:-}
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - threatmesh

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: threatmesh-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    depends_on:
      - backend
    networks:
      - threatmesh

volumes:
  neo4j_data:
  postgres_data:
  redis_data:

networks:
  threatmesh:
    driver: bridge
